name: dda-flood
channels:
  - conda-forge
  - pytorch
dependencies:
  - python=3.11
  - pip

  # --- Geospatial I/O ---
  - rasterio=1.3.*
  - geopandas=0.14.*
  - shapely=2.0.*
  - pyproj=3.6.*
  - fiona=1.9.*
  - gdal=3.8.*
  - rioxarray=0.15.*
  - xarray=2024.1.*

  # --- Scientific stack ---
  - numpy=1.26.*
  - scipy=1.11.*
  - pandas=2.1.*
  - scikit-learn=1.4.*
  - scikit-image=0.22.*
  - opencv=4.9.*

  # --- Deep learning (CPU by default; Colab installs GPU build) ---
  - pytorch=2.2.*
  - torchvision=0.17.*
  - cpuonly

  # --- Visualization ---
  - matplotlib=3.8.*
  - seaborn=0.13.*
  - plotly=5.18.*
  - folium=0.15.*

  # --- Notebooks ---
  - jupyterlab=4.0.*
  - ipykernel
  - ipywidgets

  # --- Testing / tooling ---
  - pytest=8.0.*
  - pytest-cov=4.1.*
  - ruff=0.2.*
  - black=24.1.*
  - mypy=1.8.*
  - pre-commit=3.6.*

  # --- Earth Engine & data access ---
  - earthengine-api=0.1.*

  # --- Pip-only packages ---
  - pip:
      - segmentation-models-pytorch==0.3.3
      - streamlit==1.31.*
      - streamlit-folium==0.17.*
      - sentinelsat==1.2.*
      - osmnx==1.9.*
      - weasyprint==60.2
      - reportlab==4.0.*
      - wandb==0.16.*
      - python-dotenv==1.0.*
      - albumentations==1.3.*
      - tqdm==4.66.*
      - typer==0.9.*
      - rich==13.7.*
      - s2cloudless==1.7.*
      - geemap==0.30.*
